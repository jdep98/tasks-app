<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">
        <ion-icon name="close-circle" color="medium" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Crear un Plan</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="form-container">
    <p class="section-title">Ingresa tu plan aquí</p>
    <ion-textarea class="custom-textarea" [(ngModel)]="title" placeholder="Ej. Llamar al médico"
      rows="3"></ion-textarea>

    <div class="form-row">
      <ion-item lines="none" class="info-item" button="true" id="date-trigger" detail="false">
        <ion-icon name="calendar-outline" slot="start"></ion-icon>
        <ion-label>{{ formattedDateUI }}</ion-label>
      </ion-item>

      <ion-item lines="none" class="info-item" button="true" id="time-trigger" detail="false">
        <ion-icon name="time-outline" slot="start"></ion-icon>
        <ion-label>{{ formattedTimeUI }}</ion-label>
      </ion-item>
    </div>

    <ion-modal trigger="date-trigger" [keepContentsMounted]="true">
      <ng-template>
        <ion-datetime presentation="date" [min]="today" [(ngModel)]="dateValue" showDefaultButtons="true"
          doneText="Confirmar" cancelText="Atrás"></ion-datetime>
      </ng-template>
    </ion-modal>

    <ion-modal trigger="time-trigger" [keepContentsMounted]="true">
      <ng-template>
        <ion-datetime presentation="time" [(ngModel)]="timeValue" showDefaultButtons="true" doneText="Confirmar"
          cancelText="Atrás"></ion-datetime>
      </ng-template>
    </ion-modal>

    <div class="categories-section margin-top">
      <p class="section-title">Categoría</p>
      <div class="categories-slider" role="listbox" aria-label="Seleccionar categoría">
        @for(cat of categoryService.categories(); track cat.id) {
        <button
          type="button"
          class="category-chip"
          [class.active]="categoryId === cat.id"
          (click)="categoryId = cat.id"
          [attr.aria-selected]="categoryId === cat.id"
        >
          <ion-icon [name]="cat.icon || 'folder-outline'" [style.color]="cat.color || '#0ce7e7'"></ion-icon>
          <span>{{ cat.name }}</span>
        </button>
        }
      </div>
    </div>

    @if (firebaseService.enableImportantMarker()) {
    <ion-item lines="none" class="info-item margin-top">
      <ion-icon name="star-outline" slot="start" color="primary"></ion-icon>
      <ion-label color="primary">Importante</ion-label>
      <ion-toggle slot="end" [(ngModel)]="isImportant" color="primary"></ion-toggle>
    </ion-item>
    }
  </div>
</ion-content>

<div class="btn-wrapper">
  <ion-button expand="block" shape="round" color="primary" class="complete-btn" (click)="confirm()">
    Completar Plan
  </ion-button>
</div>
